name: QA Octaipipe
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install & Setup
        run: npm run install:all

      - name: Start Container
        run: docker compose up --build -d

      - name: Debug Containers
        run: |
          docker ps -a
          docker compose ps
          docker compose logs --no-color
      - name: Wait for Guardian API
        run: npx wait-on http://localhost:3001/health --timeout 180000

      - name: Prepare Reports Directory
        run: mkdir -p reports && rm -rf reports/*
      - name: Run Full Test Suite
        run: npm run test:ci
        env:
          GUARDIAN_API_URL: http://localhost:3001
          NODE_ENV: test

      - name: Post Summary to Job Summary
        if: always()
        run: |
          if [ -f reports/summary-report.md ]; then
            cat reports/summary-report.md > $GITHUB_STEP_SUMMARY
          else
            echo "Summary report not found" > $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-qa-reports
          path: reports/
      - name: Stop Containers
        if: always()
        run: docker compose down
